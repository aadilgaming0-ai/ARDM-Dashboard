<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>ARDM · Executive Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ══════════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════════ */
:root {
  --m900:#3d0c1a; --m800:#5e1428; --m700:#7b1e3a;
  --m600:#92243f; --m500:#aa2b4a; --m400:#c43360;
  --m100:#f6e8ed; --m50:#fdf4f6;
  --g900:#0f1218; --g800:#1e2330; --g700:#2e3447;
  --g600:#4a5165; --g500:#6b738a; --g400:#8f97ac;
  --g300:#bcc2d0; --g200:#d8dde8; --g150:#e8ecf3;
  --g100:#f1f4f9; --g50:#f7f9fc;
  --white:#fff;
  --bg:var(--g50); --surface:var(--white);
  --border:var(--g150); --border2:var(--g200);
  --t1:#0d1520; --t2:#3a4255; --t3:#7a8499; --t4:#b0b8c8;
  --accent:var(--m700);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --r24:24px;--r28:28px;--r32:32px;--r999:999px;
  --sh-xs:0 1px 4px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
  --sh-sm:0 2px 8px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.03);
  --sh-md:0 6px 24px rgba(0,0,0,.07),0 2px 6px rgba(0,0,0,.04);
  --sh-group:0 4px 20px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --sh-acc:0 10px 36px rgba(123,30,58,.28),0 3px 10px rgba(123,30,58,.14);
  --sh-inner:inset 0 1px 0 rgba(255,255,255,.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{
  font-family:'Outfit',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 30% at 80% 10%,rgba(123,30,58,.04) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 10% 80%,rgba(123,30,58,.03) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* BRAND STRIP */
.brand-strip{height:3px;background:linear-gradient(90deg,var(--m900),var(--m700) 40%,var(--m500) 70%,var(--m100));position:relative;overflow:hidden;}
.brand-strip::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.4) 50%,transparent 100%);animation:stripShimmer 3s ease-in-out infinite;}
@keyframes stripShimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

/* LAYOUT */
.dashboard{max-width:480px;margin:0 auto;padding:0 16px 60px;position:relative;z-index:1;}

/* PAGE HEADER — no last-updated pill */
.page-header{padding:20px 0 18px;}
.header-wordmark{display:flex;flex-direction:column;gap:3px;margin-bottom:18px;}
.wordmark-sup{font-size:.60rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);}
.wordmark-title{font-size:1.6rem;font-weight:900;letter-spacing:-.035em;line-height:1;color:var(--t1);}
.wordmark-title em{font-style:normal;color:var(--m700);}

/* SEARCH */
.search-container{display:flex;gap:10px;align-items:center;margin-bottom:20px;}
.search-input-wrapper{flex:1;position:relative;}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--m700);font-size:.8rem;opacity:.55;pointer-events:none;transition:opacity .2s;}
.search-input-wrapper:focus-within .search-icon{opacity:1;}
#sapInput{width:100%;padding:15px 16px 15px 42px;font-size:.9rem;font-family:'Outfit',sans-serif;font-weight:500;background:var(--white);border:1.5px solid var(--border2);border-radius:var(--r999);color:var(--t1);transition:border-color .2s,box-shadow .2s;box-shadow:var(--sh-xs);-webkit-appearance:none;}
#sapInput::placeholder{color:var(--t4);font-weight:400;}
#sapInput:focus{outline:none;border-color:var(--m700);box-shadow:0 0 0 4px rgba(123,30,58,.10),var(--sh-sm);background:#fff;}
.btn-primary{background:var(--m700);color:var(--white);border:none;border-radius:var(--r999);padding:15px 22px;font-family:'Outfit',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;box-shadow:var(--sh-acc);display:flex;align-items:center;gap:7px;white-space:nowrap;transition:background .15s,transform .12s,box-shadow .15s;-webkit-appearance:none;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);}
.btn-primary:hover{background:var(--m600);}
.btn-primary:active{background:var(--m800);transform:scale(.96);box-shadow:0 4px 12px rgba(123,30,58,.25);}
.btn-primary:disabled{opacity:.5;pointer-events:none;}
.btn-primary i{transition:transform .2s;}
.btn-primary:hover i{transform:translateX(2px);}

/* ══════════════════════════════════════════════════
   SECTION GROUP WRAPPER
   A large outer panel that holds multiple inner cards.
   Subtle shadow, rounded, slight background tint.
══════════════════════════════════════════════════ */
.section-group{
  background:var(--white);
  border-radius:var(--r28);
  border:1px solid var(--border);
  box-shadow:var(--sh-group);
  margin-bottom:16px;
  overflow:hidden;
  position:relative;
}
/* left maroon accent strip for group */
.section-group::before{
  content:'';position:absolute;
  top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--m700) 0%,var(--m400) 60%,transparent 100%);
  border-radius:var(--r28) 0 0 var(--r28);
  z-index:1;
}

/* GROUP FOOTER — last-updated bar at bottom of each group */
.group-footer{
  display:flex;align-items:center;gap:7px;
  padding:10px 18px 12px;
  border-top:1px solid var(--border);
  background:var(--g50);
}
.group-footer i{font-size:.62rem;color:var(--m700);}
.group-footer-text{font-size:.65rem;color:var(--t3);font-weight:500;}
.group-footer-date{font-size:.65rem;font-weight:700;color:var(--t2);}

/* INNER CARD — used inside a section-group (no outer shadow, no outer border) */
.inner-card{
  padding:20px 20px 18px;
  position:relative;
  overflow:hidden;
}
/* hairline divider between inner cards */
.inner-card+.inner-card{
  border-top:1px solid var(--border);
}

/* SECTION HEADER (inside inner-card) */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.section-header-icon{width:30px;height:30px;border-radius:var(--r8);background:linear-gradient(135deg,var(--m50),var(--m100));border:1px solid var(--m100);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-header-icon i{font-size:.68rem;color:var(--m700);}
.section-header h2{font-size:.72rem;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;flex:1;}
.section-header .rule{flex:1;height:1px;background:var(--border);}

/* LAKHS NOTICE PILL */
.lakhs-notice{display:inline-flex;align-items:center;gap:5px;background:var(--m50);border:1px solid var(--m100);border-radius:var(--r999);padding:3px 10px;font-size:.62rem;font-weight:600;color:var(--m700);flex-shrink:0;}
.lakhs-notice i{font-size:.55rem;}

/* ══════════════════════════════════════════════════
   STANDALONE CARD (employee card — not in a group)
══════════════════════════════════════════════════ */
.card{background:var(--white);border-radius:var(--r24);padding:22px 20px;margin-bottom:16px;box-shadow:var(--sh-sm);border:1px solid var(--border);position:relative;overflow:hidden;transition:box-shadow .25s;}
.card:hover{box-shadow:var(--sh-md);}
.card::before{content:'';position:absolute;top:20px;left:0;width:3px;height:36px;background:linear-gradient(180deg,var(--m700),var(--m400));border-radius:0 var(--r4) var(--r4) 0;}

/* WELCOME */
.welcome-card{background:var(--white);border-radius:var(--r24);padding:56px 24px;text-align:center;border:1px solid var(--border);box-shadow:var(--sh-sm);position:relative;overflow:hidden;}
.welcome-card::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:280px;height:160px;background:radial-gradient(ellipse,rgba(123,30,58,.05) 0%,transparent 70%);pointer-events:none;}
.welcome-rings{position:relative;width:80px;height:80px;margin:0 auto 20px;}
.welcome-rings .ring{position:absolute;border-radius:50%;border:1.5px solid var(--m100);top:50%;left:50%;transform:translate(-50%,-50%);animation:ringPulse 3s ease-in-out infinite;}
.welcome-rings .ring:nth-child(1){width:80px;height:80px;animation-delay:0s;}
.welcome-rings .ring:nth-child(2){width:60px;height:60px;animation-delay:.4s;}
.welcome-rings .ring:nth-child(3){width:40px;height:40px;background:var(--m50);border-color:var(--m100);display:flex;align-items:center;justify-content:center;}
.welcome-rings .ring:nth-child(3) i{font-size:1.1rem;color:var(--m700);opacity:.6;}
@keyframes ringPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.04);}}
.welcome-card h2{font-size:1.15rem;font-weight:700;color:var(--t1);margin-bottom:6px;}
.welcome-card p{font-size:.82rem;color:var(--t3);}

/* ERROR */
.error-card{background:#fff9f9;border-radius:var(--r24);padding:40px 20px;text-align:center;border:1px solid #fecdd3;box-shadow:var(--sh-xs);}
.error-card i{font-size:1.8rem;color:#be1b1b;margin-bottom:10px;display:block;opacity:.7;}
.error-card p{font-size:.88rem;color:var(--t2);}

/* ══════════════════════════════════════════════════
   EMPLOYEE CARD
══════════════════════════════════════════════════ */
.emp-card-bg{position:absolute;top:0;right:0;bottom:0;width:45%;background:linear-gradient(135deg,transparent 20%,rgba(123,30,58,.025) 100%);pointer-events:none;}
.emp-header-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.sap-badge{display:inline-flex;align-items:center;gap:6px;background:var(--m50);border:1px solid var(--m100);border-radius:var(--r999);padding:5px 14px;font-size:.72rem;font-weight:700;color:var(--m700);letter-spacing:.02em;}
.sap-badge i{font-size:.62rem;}
.emp-avatar{width:44px;height:44px;flex-shrink:0;background:linear-gradient(135deg,var(--m700) 0%,var(--m500) 100%);border-radius:var(--r12);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:1rem;font-weight:800;letter-spacing:-.02em;box-shadow:0 6px 18px rgba(123,30,58,.28),var(--sh-inner);position:relative;overflow:hidden;}
.emp-avatar::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);}
.employee-name{font-size:1.5rem;font-weight:800;color:var(--t1);margin-bottom:16px;letter-spacing:-.03em;line-height:1.15;}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding-top:14px;border-top:1px solid var(--border);}
.meta-item{padding:2px 0;}
.meta-item:not(:last-child){border-right:1px solid var(--border);padding-right:10px;}
.meta-item:not(:first-child){padding-left:10px;}
.meta-label{font-size:.60rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.meta-label i{color:var(--m700);font-size:.56rem;}
.meta-value{font-size:.82rem;font-weight:700;color:var(--t1);line-height:1.3;}

/* ══════════════════════════════════════════════════
   YTD SUMMARY
══════════════════════════════════════════════════ */
.ytd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ytd-card{border-radius:var(--r16);padding:16px 8px 14px;border:1px solid var(--border);text-align:center;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default;}
.ytd-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.ytd-card.nop-cell{background:linear-gradient(160deg,#fff 60%,var(--m50) 100%);}
.ytd-card.wcp-cell{background:linear-gradient(160deg,#fff 60%,var(--g100) 100%);}
.ytd-card.per-cell{background:linear-gradient(160deg,#fff 60%,var(--g50) 100%);}
.ytd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r16) var(--r16) 0 0;}
.ytd-card.nop-cell::before{background:linear-gradient(90deg,var(--m700),var(--m500));}
.ytd-card.wcp-cell::before{background:linear-gradient(90deg,var(--g700),var(--g500));}
.ytd-card.per-cell::before{background:linear-gradient(90deg,var(--g400),var(--g300));}
.ytd-label{font-size:.60rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:8px;}
.ytd-value{font-size:1.25rem;font-weight:800;letter-spacing:-.025em;line-height:1;}
.ytd-value.nop{color:var(--m700);}
.ytd-value.wcp{color:var(--g700);}

/* ══════════════════════════════════════════════════
   SHORTFALL
══════════════════════════════════════════════════ */
.shortfall-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.shortfall-header-icon{width:32px;height:32px;border-radius:var(--r12);background:linear-gradient(135deg,var(--m50),var(--m100));border:1px solid var(--m100);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.shortfall-header-icon i{font-size:.78rem;color:var(--m700);}
.shortfall-header h3{font-size:.88rem;font-weight:800;color:var(--t1);}
.shortfall-list{display:flex;flex-direction:column;gap:7px;}
.shortfall-item{display:flex;align-items:center;justify-content:space-between;background:var(--g50);border-radius:var(--r12);padding:12px 14px 12px 10px;border:1px solid var(--border);transition:background .15s,transform .15s,box-shadow .15s;cursor:default;}
.shortfall-item:hover{background:#fff;transform:translateX(2px);box-shadow:var(--sh-sm);}
.shortfall-item-label{font-weight:600;font-size:.82rem;color:var(--t2);display:flex;align-items:center;gap:9px;}
.sf-icon-wrap{width:28px;height:28px;border-radius:var(--r8);background:linear-gradient(135deg,var(--m50),var(--m100));border:1px solid var(--m100);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.shortfall-item:hover .sf-icon-wrap{background:linear-gradient(135deg,var(--m100),rgba(123,30,58,.12));}
.sf-icon-wrap i{font-size:.68rem;color:var(--m700);}
.shortfall-item-value{font-weight:800;font-size:.92rem;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;padding:3px 12px;border-radius:var(--r999);font-variant-numeric:tabular-nums;}

/* ══════════════════════════════════════════════════
   MONTHLY OVERVIEW KPI TILES
══════════════════════════════════════════════════ */
.monthly-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.monthly-card{background:var(--g50);border-radius:var(--r16);padding:14px 10px 12px;border:1px solid var(--border);text-align:center;transition:transform .2s,box-shadow .2s,background .2s;cursor:default;}
.monthly-card:hover{background:#fff;transform:translateY(-2px);box-shadow:var(--sh-sm);}
.monthly-label{font-size:.60rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:5px;}
.monthly-label i{color:var(--m700);font-size:.64rem;}
.monthly-value{font-size:1.3rem;font-weight:800;letter-spacing:-.025em;line-height:1;color:var(--t1);}

/* MOM DROPDOWN */
.month-section{border:1px solid var(--border2);border-radius:var(--r20);background:var(--white);overflow:hidden;}
.month-header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;background:var(--white);transition:background .15s;user-select:none;}
.month-header:active{background:var(--g50);}
.month-header-left{display:flex;align-items:center;gap:10px;font-weight:700;font-size:.82rem;color:var(--t2);}
.chevron-wrap{width:22px;height:22px;border-radius:var(--r999);background:var(--m50);border:1px solid var(--m100);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .25s ease;}
.month-header.expanded .chevron-wrap{background:var(--m700);transform:rotate(180deg);}
.chevron-wrap i{font-size:.56rem;color:var(--m700);transition:color .2s;}
.month-header.expanded .chevron-wrap i{color:#fff;}
.preview-values{background:var(--m50);border:1px solid var(--m100);color:var(--m700);padding:4px 11px;border-radius:var(--r999);font-size:.72rem;font-weight:700;}
.month-content{max-height:0;opacity:0;overflow:hidden;transition:max-height .32s ease,opacity .25s ease;}
.month-content.expanded{max-height:680px;opacity:1;}
.month-header-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:7px 16px 5px;font-size:.60rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);border-top:1px solid var(--border);background:var(--g50);}
.month-header-row span:not(:first-child){text-align:right;}
.month-rows{display:flex;flex-direction:column;gap:4px;padding:6px 10px 12px;background:var(--g50);}
.month-row{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;background:var(--white);border-radius:var(--r12);padding:10px 12px;border:1px solid var(--border);font-size:.87rem;transition:background .15s,transform .15s;}
.month-row:hover{background:var(--m50);transform:translateX(2px);}
.month-row .month-name{font-weight:700;color:var(--t1);}
.wrp-value{font-weight:700;color:var(--m700);text-align:right;font-variant-numeric:tabular-nums;}
.wcp-value{font-weight:700;color:var(--g600);text-align:right;font-variant-numeric:tabular-nums;}
.zero-value{color:var(--g300)!important;font-weight:400!important;}

/* ══════════════════════════════════════════════════
   FINAL REWARD — inside group 2, no explicit label
══════════════════════════════════════════════════ */
.reward-inner-row{display:flex;align-items:center;justify-content:space-between;gap:14px;}
.reward-left{flex:1;min-width:0;}
.reward-eyebrow{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.10em;color:var(--t3);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.reward-eyebrow i{color:var(--m700);}
.reward-value-text{font-size:1.4rem;font-weight:800;color:var(--t1);letter-spacing:-.025em;line-height:1.25;word-break:break-word;}
.reward-icon-box{background:linear-gradient(135deg,var(--m50),var(--m100));border:1px solid var(--m100);width:46px;height:46px;border-radius:var(--r16);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;transition:transform .2s;}
.reward-icon-box i{color:var(--m700);}

/* ══════════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════════ */
.footer-note{text-align:center;color:var(--t4);font-size:.65rem;padding:16px 0 4px;display:flex;justify-content:center;align-items:center;gap:8px;}
.footer-note i{font-size:.58rem;}

/* ══════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════ */
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-anim{animation:cardIn .42s cubic-bezier(.22,.68,0,1.2) both;}
.card-anim:nth-child(1){animation-delay:.00s;}
.card-anim:nth-child(2){animation-delay:.07s;}
.card-anim:nth-child(3){animation-delay:.14s;}
.card-anim:nth-child(4){animation-delay:.21s;}
.card-anim:nth-child(5){animation-delay:.28s;}
@keyframes numFlash{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.num-flash{animation:numFlash .5s ease both;}

/* SKELETON */
@keyframes shimmer{0%{background-position:-600px 0;}100%{background-position:600px 0;}}
.skel{background:linear-gradient(90deg,var(--g150) 25%,var(--g100) 50%,var(--g150) 75%);background-size:1200px 100%;animation:shimmer 1.5s infinite linear;border-radius:8px;}

@media(min-width:640px){
  .dashboard{max-width:720px;}
  .meta-grid{grid-template-columns:repeat(3,1fr);}
  .monthly-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<div class="brand-strip"></div>

<div class="dashboard">

  <!-- PAGE HEADER — no last-updated pill here -->
  <div class="page-header">
    <div class="header-wordmark">
      <span class="wordmark-sup">Executive Report</span>
      <span class="wordmark-title">ARDM <em>Performance</em></span>
    </div>
    <div class="search-container">
      <div class="search-input-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="sapInput" placeholder="Enter SAP ID" autocomplete="off" inputmode="numeric">
      </div>
      <button class="btn-primary" onclick="fetchData()" id="searchBtn">
        <i class="fas fa-arrow-right"></i> Search
      </button>
    </div>
  </div>

  <div id="content">
    <div class="welcome-card">
      <div class="welcome-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"><i class="fas fa-chart-pie"></i></div>
      </div>
      <h2>Welcome</h2>
      <p>Enter SAP ID to access data</p>
    </div>
  </div>

</div>

<script>
(function () {
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzKXDilaOh8JJrTypyUGilXfezrah5Hd4QnEC6iM8tloMuQVIYODupBZV6H4DO9DKIIQg/exec";
  const searchBtn = document.getElementById('searchBtn');
  const sapInput  = document.getElementById('sapInput');

  /* ── formatters ── */
  function fmt1(value) {
    const num = Number(value) || 0;
    return num.toLocaleString('en-IN', { minimumFractionDigits:1, maximumFractionDigits:1 });
  }
  function formatInt(value) {
    return Math.round(Number(value) || 0).toLocaleString('en-IN');
  }
  function formatPercent(value) {
    if (!value || value === '—') return '—';
    const num = parseFloat(value);
    if (isNaN(num)) return value;
    return (num <= 1 ? Math.round(num * 100) : Math.round(num)) + '%';
  }
  function getValue(obj, keys, fallback) {
    fallback = fallback === undefined ? '—' : fallback;
    if (!obj) return fallback;
    for (let k of keys)
      if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
    return fallback;
  }
  function calculateTotals(emp, months) {
    let wrp = 0, wcp = 0;
    months.forEach(m => { wrp += Number(emp[m.wrpKey])||0; wcp += Number(emp[m.wcpKey])||0; });
    return { totalWRP:wrp, totalWCP:wcp };
  }
  function getInitials(name) {
    if (!name || name === '—') return '?';
    const p = name.trim().split(/\s+/);
    return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
  }
  function fmtDate(raw) {
    if (!raw) return null;
    const d = new Date(raw);
    if (isNaN(d)) return String(raw);
    return d.toLocaleString('en-IN', { day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true });
  }
  function fmtRaw(val) {
    return (val === undefined || val === null || val === '') ? '—' : String(val);
  }

  /* ── animated counter ── */
  function animateCount(el, targetStr) {
    const raw = parseFloat(String(targetStr).replace(/,/g,'')) || 0;
    if (!raw) return;
    const isDecimal = String(targetStr).includes('.');
    const steps = 40, stepTime = 900 / steps;
    let step = 0;
    const timer = setInterval(() => {
      step++;
      const cur = raw * (1 - Math.pow(1 - step/steps, 3));
      el.textContent = isDecimal
        ? cur.toLocaleString('en-IN',{minimumFractionDigits:1,maximumFractionDigits:1})
        : Math.round(cur).toLocaleString('en-IN');
      if (step >= steps) { clearInterval(timer); el.textContent = targetStr; }
    }, stepTime);
  }

  /* ── skeleton ── */
  function showLoading() {
    document.getElementById('content').innerHTML = `
      <div class="card card-anim" style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;justify-content:space-between;">
          <div class="skel" style="height:26px;width:130px;border-radius:999px;"></div>
          <div class="skel" style="height:44px;width:44px;border-radius:12px;"></div>
        </div>
        <div class="skel" style="height:34px;width:68%;"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="skel" style="height:46px;border-radius:10px;"></div>
          <div class="skel" style="height:46px;border-radius:10px;"></div>
          <div class="skel" style="height:46px;border-radius:10px;"></div>
        </div>
      </div>
      <div class="section-group card-anim">
        <div style="padding:20px 20px 16px;display:flex;flex-direction:column;gap:12px;">
          <div class="skel" style="height:18px;width:38%;"></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
            <div class="skel" style="height:76px;border-radius:14px;"></div>
            <div class="skel" style="height:76px;border-radius:14px;"></div>
            <div class="skel" style="height:76px;border-radius:14px;"></div>
          </div>
        </div>
        <div style="padding:4px 20px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;">
          <div class="skel" style="height:18px;width:28%;margin-bottom:4px;"></div>
          <div class="skel" style="height:52px;border-radius:12px;"></div>
          <div class="skel" style="height:52px;border-radius:12px;"></div>
          <div class="skel" style="height:52px;border-radius:12px;"></div>
          <div class="skel" style="height:52px;border-radius:12px;"></div>
        </div>
        <div style="padding:10px 18px 12px;border-top:1px solid var(--border);background:var(--g50);">
          <div class="skel" style="height:14px;width:55%;border-radius:999px;"></div>
        </div>
      </div>
      <div class="section-group card-anim">
        <div style="padding:20px 20px 16px;display:flex;flex-direction:column;gap:12px;">
          <div class="skel" style="height:18px;width:42%;"></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
            <div class="skel" style="height:68px;border-radius:14px;"></div>
            <div class="skel" style="height:68px;border-radius:14px;"></div>
            <div class="skel" style="height:68px;border-radius:14px;"></div>
          </div>
          <div class="skel" style="height:48px;border-radius:18px;"></div>
        </div>
        <div style="padding:16px 20px 16px;border-top:1px solid var(--border);">
          <div class="skel" style="height:44px;border-radius:12px;"></div>
        </div>
        <div style="padding:10px 18px 12px;border-top:1px solid var(--border);background:var(--g50);">
          <div class="skel" style="height:14px;width:55%;border-radius:999px;"></div>
        </div>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('content').innerHTML =
      `<div class="error-card card-anim"><i class="fas fa-exclamation-triangle"></i><p>${msg}</p></div>`;
  }

  window.toggleMonthSection = function(header) {
    const s = header.closest('.month-section');
    const c = s.querySelector('.month-content');
    header.classList.toggle('expanded');
    c.classList.toggle('expanded');
  };

  function fetchData() {
    const sap = sapInput.value.trim();
    if (!sap) { showError('Enter SAP ID'); sapInput.focus(); return; }
    searchBtn.disabled = true;
    showLoading();
    fetch(WEB_APP_URL + '?sap=' + encodeURIComponent(sap))
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => { if (data.error) showError(data.error); else renderDashboard(data); })
      .catch(() => showError('Connection error'))
      .finally(() => searchBtn.disabled = false);
  }

  function renderDashboard(emp) {
    const months = [
      {wrpKey:"WRP_4", wcpKey:"CCP_4", name:"Apr"},
      {wrpKey:"WRP_5", wcpKey:"CCP_5", name:"May"},
      {wrpKey:"WRP_6", wcpKey:"CCP_6", name:"Jun"},
      {wrpKey:"WRP_7", wcpKey:"CCP_7", name:"Jul"},
      {wrpKey:"WRP_8", wcpKey:"CCP_8", name:"Aug"},
      {wrpKey:"WRP_9", wcpKey:"CCP_9", name:"Sep"},
      {wrpKey:"WRP_10",wcpKey:"CCP_10",name:"Oct"},
      {wrpKey:"WRP_11",wcpKey:"CCP_11",name:"Nov"},
      {wrpKey:"WRP_12",wcpKey:"CCP_12",name:"Dec"},
      {wrpKey:"WRP_1", wcpKey:"CCP_1", name:"Jan"},
      {wrpKey:"WRP_2", wcpKey:"CCP_2", name:"Feb"},
      {wrpKey:"WRP_3", wcpKey:"CCP_3", name:"Mar"}
    ];

    const latest    = months[months.length - 1];
    const latestWrp = Number(emp[latest.wrpKey]) || 0;
    const latestWcp = Number(emp[latest.wcpKey]) || 0;
    const totals    = calculateTotals(emp, months);

    const ytdNOP    = getValue(emp, ['YTD NOP'], 0);
    const ytdWCPVal = Number(getValue(emp, ['YTD WCP','YTD_WCP'], totals.totalWCP));
    const persistency = formatPercent(getValue(emp, ['YTD Persistency','Persistencey','PERSISTENCY'], '—'));

    /* Final Reward — raw value straight from sheet, no modification */
    const finalReward = fmtRaw(getValue(emp, ['Final Reward','Final_Reward','Reward']));

    const monthlyWRP = Number(getValue(emp, ['WRP'], 0));
    const mtdWCPVal  = Number(getValue(emp, ['MTD_WCP','MTD WCP/CCP'], 0));

    const sfCC = Number(getValue(emp, ['Champion Club Shortfall','CC Shortfall'], 0));
    const sfSC = Number(getValue(emp, ['Super Champion & Abv Shortfall','Super Champion Shortfall'], 0));
    const sfM  = Number(getValue(emp, ['Millionaire Shortfall','M Shortfall'], 0));
    const sfMM = Number(getValue(emp, ['Multi-Millionaire Shortfall','MM Shortfall'], 0));

    /* Section-level last-updated — read raw from sheet */
    const ccpLastRaw = getValue(emp, ['CCP Last updated on','CCP Last Updated On'], null);
    const mcLastRaw  = getValue(emp, ['MC Last Updated On','MC Last updated on'], null);
    const ccpLastStr = ccpLastRaw && ccpLastRaw !== '—' ? (fmtDate(ccpLastRaw) || String(ccpLastRaw)) : null;
    const mcLastStr  = mcLastRaw  && mcLastRaw  !== '—' ? (fmtDate(mcLastRaw)  || String(mcLastRaw))  : null;

    const empName = getValue(emp, ['Name of the ARDM','ARDM Name','ARDM','name']);
    const sapId   = getValue(emp, ['SAP','sap','SAP ID']);

    /* 12 month rows */
    const monthRowsHtml = months.map(m => {
      const w = Number(emp[m.wrpKey])||0, c = Number(emp[m.wcpKey])||0;
      return `<div class="month-row">
        <span class="month-name">${m.name}</span>
        <span class="wrp-value ${w===0?'zero-value':''}">${w===0?'—':fmt1(w)}</span>
        <span class="wcp-value ${c===0?'zero-value':''}">${c===0?'—':fmt1(c)}</span>
      </div>`;
    }).join('');

    /* group footer HTML helper */
    const groupFooter = (str, label) => str
      ? `<div class="group-footer">
           <i class="far fa-clock"></i>
           <span class="group-footer-text">${label} as of</span>
           <span class="group-footer-date">${str}</span>
         </div>`
      : '';

    const html = `
      <!-- ① EMPLOYEE CARD (standalone) -->
      <div class="card card-anim">
        <div class="emp-card-bg"></div>
        <div class="emp-header-row">
          <div class="sap-badge"><i class="fas fa-id-card"></i> SAP · ${sapId}</div>
          <div class="emp-avatar">${getInitials(empName)}</div>
        </div>
        <div class="employee-name">${empName}</div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label"><i class="fas fa-code-branch"></i> Branch</div>
            <div class="meta-value">${getValue(emp,['Salesunit Name','branch','BRANCH'])}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label"><i class="fas fa-map-marker-alt"></i> Region</div>
            <div class="meta-value">${getValue(emp,['Region','region'])}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label"><i class="fas fa-tag"></i> Channel</div>
            <div class="meta-value">${getValue(emp,['Channel Name','channel'])}</div>
          </div>
        </div>
      </div>

      <!-- ② GROUP 1 — YTD Summary + Shortfall (annual data) -->
      <div class="section-group card-anim">

        <!-- YTD SUMMARY inner card -->
        <div class="inner-card">
          <div class="section-header">
            <div class="section-header-icon"><i class="far fa-calendar-alt"></i></div>
            <h2>YTD Summary</h2>
            <div class="rule"></div>
            <span class="lakhs-notice"><i class="fas fa-indian-rupee-sign"></i> in Lakhs</span>
          </div>
          <div class="ytd-grid">
            <div class="ytd-card nop-cell">
              <div class="ytd-label">NOP</div>
              <div class="ytd-value nop num-flash" id="ytd-nop">${formatInt(ytdNOP)}</div>
            </div>
            <div class="ytd-card wcp-cell">
              <div class="ytd-label">WCP</div>
              <div class="ytd-value wcp num-flash" id="ytd-wcp">${fmt1(ytdWCPVal)}</div>
            </div>
            <div class="ytd-card per-cell">
              <div class="ytd-label">Persistency</div>
              <div class="ytd-value num-flash">${persistency}</div>
            </div>
          </div>
        </div>

        <!-- SHORTFALL inner card -->
        <div class="inner-card">
          <div class="shortfall-header">
            <div class="shortfall-header-icon"><i class="fas fa-scale-unbalanced"></i></div>
            <h3>Shortfall</h3>
          </div>
          <div class="shortfall-list">
            <div class="shortfall-item">
              <span class="shortfall-item-label">
                <span class="sf-icon-wrap"><i class="fas fa-trophy"></i></span>Champion Club
              </span>
              <span class="shortfall-item-value">${sfCC===0?'—':fmt1(sfCC)}</span>
            </div>
            <div class="shortfall-item">
              <span class="shortfall-item-label">
                <span class="sf-icon-wrap"><i class="fas fa-star"></i></span>Super Champion
              </span>
              <span class="shortfall-item-value">${sfSC===0?'—':fmt1(sfSC)}</span>
            </div>
            <div class="shortfall-item">
              <span class="shortfall-item-label">
                <span class="sf-icon-wrap"><i class="fas fa-coins"></i></span>Millionaire
              </span>
              <span class="shortfall-item-value">${sfM===0?'—':fmt1(sfM)}</span>
            </div>
            <div class="shortfall-item">
              <span class="shortfall-item-label">
                <span class="sf-icon-wrap"><i class="fas fa-gem"></i></span>Multi&#8209;Millionaire
              </span>
              <span class="shortfall-item-value">${sfMM===0?'—':fmt1(sfMM)}</span>
            </div>
          </div>
        </div>

        <!-- GROUP 1 FOOTER — CCP last updated -->
        ${groupFooter(ccpLastStr, 'CCP data')}
      </div>

      <!-- ③ GROUP 2 — Monthly Overview + Final Reward (monthly data) -->
      <div class="section-group card-anim">

        <!-- MONTHLY OVERVIEW inner card -->
        <div class="inner-card">
          <div class="section-header">
            <div class="section-header-icon"><i class="fas fa-chart-line"></i></div>
            <h2>Monthly Overview</h2>
            <div class="rule"></div>
            <span class="lakhs-notice"><i class="fas fa-indian-rupee-sign"></i> in Lakhs</span>
          </div>
          <div class="monthly-grid">
            <div class="monthly-card">
              <div class="monthly-label"><i class="fas fa-chart-bar"></i> WRP</div>
              <div class="monthly-value">${fmt1(monthlyWRP)}</div>
            </div>
            <div class="monthly-card">
              <div class="monthly-label"><i class="fas fa-file-invoice"></i> NOP</div>
              <div class="monthly-value">${formatInt(getValue(emp,['NOP','Nop'],0))}</div>
            </div>
            <div class="monthly-card">
              <div class="monthly-label"><i class="fas fa-bolt"></i> MTD WCP</div>
              <div class="monthly-value">${fmt1(mtdWCPVal)}</div>
            </div>
          </div>
          <!-- MoM DROPDOWN — all 12 months -->
          <div class="month-section">
            <div class="month-header" onclick="toggleMonthSection(this)">
              <div class="month-header-left">
                <span class="chevron-wrap"><i class="fas fa-chevron-down"></i></span>
                Month-wise WRP &amp; WCP
              </div>
              <div class="preview-values">${latest.name}: ${fmt1(latestWrp)} / ${fmt1(latestWcp)}</div>
            </div>
            <div class="month-content">
              <div class="month-header-row">
                <span>Month</span><span>WRP</span><span>WCP</span>
              </div>
              <div class="month-rows">${monthRowsHtml}</div>
            </div>
          </div>
        </div>

        <!-- FINAL REWARD inner card — raw value from sheet, no added text -->
        <div class="inner-card">
          <div class="reward-inner-row">
            <div class="reward-left">
              <div class="reward-eyebrow"><i class="fas fa-crown"></i> Final Reward</div>
              <div class="reward-value-text">${finalReward}</div>
            </div>
            <div class="reward-icon-box"><i class="fas fa-crown"></i></div>
          </div>
        </div>

        <!-- GROUP 2 FOOTER — MC last updated -->
        ${groupFooter(mcLastStr, 'MC data')}
      </div>

      <!-- FOOTER -->
      <div class="footer-note card-anim">
        <i class="fas fa-circle-dot"></i> All figures are in Lakhs &nbsp;·&nbsp;
        <i class="far fa-calendar-check"></i> Data from Google Sheets
      </div>
    `;

    document.getElementById('content').innerHTML = html;

    requestAnimationFrame(() => {
      const nopEl = document.getElementById('ytd-nop');
      const wcpEl = document.getElementById('ytd-wcp');
      if (nopEl) animateCount(nopEl, formatInt(ytdNOP));
      if (wcpEl) animateCount(wcpEl, fmt1(ytdWCPVal));
    });
  }

  sapInput.addEventListener('keypress', e => { if (e.key === 'Enter') fetchData(); });
  sapInput.addEventListener('input', function () { this.value = this.value.replace(/[^0-9]/g,''); });
  window.fetchData = fetchData;
})();
</script>
</body>
</html>
